# DischargeGuard Synthea Configuration
# Generates patients optimized for post-discharge monitoring scenarios

# Output settings
exporter.fhir.export = true
exporter.fhir.transaction_bundle = true
exporter.hospital.fhir.export = true
exporter.practitioner.fhir.export = true
exporter.fhir.use_us_core_ig = false

# Output directory
exporter.baseDirectory = ./output/

# Target conditions for discharge-relevant patients
# Heart failure, COPD, diabetes, stroke produce rich LACE scores
generate.default_population = 50

# Include realistic medication lists (critical for reconciliation)
generate.only_alive_patients = false
